<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AARP Utah · Legislative Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
.header{background:#1a1a1a;color:#fff;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-title{font-size:14px;font-weight:500;}
.header-sub{font-size:11px;color:#999;margin-top:1px;}
.sync-btn{font-size:12px;padding:4px 10px;border:0.5px solid #444;border-radius:8px;background:transparent;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sync-btn:hover{background:#333;}
.page{max-width:1400px;margin:0 auto;padding:1rem;}

/* outer: tracker left (2fr), calendar right (1fr) */
.outer-grid{display:grid;grid-template-columns:1fr;gap:1rem;}
@media(min-width:768px){.outer-grid{grid-template-columns:2fr 1fr;align-items:start;}}

.panel{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;overflow:hidden;}
.panel-header{padding:0.75rem 1rem;border-bottom:0.5px solid #e8e8e0;display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;}
.panel-body{padding:0.875rem 1rem;}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem;}
.stat{background:#f5f5f3;border-radius:8px;padding:8px;text-align:center;}
.stat-n{font-size:20px;font-weight:500;}
.stat-l{font-size:10px;color:#aaa;margin-top:1px;}
.green{color:#1D9E75;}.red{color:#E24B4A;}.blue{color:#378ADD;}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.toolbar input{flex:1;min-width:130px;height:34px;padding:0 10px;border:0.5px solid #d0d0c8;border-radius:8px;background:#fff;font-size:13px;color:#1a1a1a;outline:none;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
select{height:34px;padding:0 8px;border:0.5px solid #d0d0c8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:12px;outline:none;}
.btn{display:inline-flex;align-items:center;gap:4px;height:34px;padding:0 10px;border:0.5px solid #d0d0c8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:12px;cursor:pointer;white-space:nowrap;}
.btn:hover{background:#f0f0ee;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn-primary:hover{background:#333;}
.btn-icon{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center;border:0.5px solid #d0d0c8;border-radius:8px;background:#fff;color:#666;cursor:pointer;}
.btn-icon:hover{background:#f0f0ee;}
.count{font-size:11px;color:#aaa;margin-bottom:8px;}

/* bill grid — always 1 col on mobile, 2 col on desktop */
#bill-grid{display:grid;grid-template-columns:1fr;gap:8px;}
@media(min-width:768px){#bill-grid{grid-template-columns:1fr 1fr;}}

.bill-card{border:0.5px solid #e8e8e0;border-radius:10px;padding:0.75rem 0.875rem;border-left:3px solid #ccc;background:#fff;}
.bill-card.support{border-left-color:#1D9E75;}
.bill-card.oppose{border-left-color:#E24B4A;}
.bill-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.bill-meta{flex:1;min-width:0;}
.bill-number{font-size:11px;font-weight:500;color:#888;}
.bill-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-top:2px;line-height:1.4;}
.bill-sub{font-size:11px;color:#bbb;margin-top:2px;}
.bill-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.badge{font-size:10px;padding:2px 6px;border-radius:5px;border:0.5px solid;font-weight:500;}
.badge-support{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;}
.badge-oppose{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.badge-neutral{background:#f1f0e8;color:#777;border-color:#ccc;}
.bars{display:flex;gap:2px;align-items:flex-end;}
.bar{width:5px;border-radius:2px;background:#e8e8e0;}
.bar.on{background:#378ADD;}
.flags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center;}
.flag{font-size:11px;padding:2px 6px;border-radius:5px;border:0.5px solid #d8d8d0;color:#999;cursor:pointer;user-select:none;display:flex;align-items:center;gap:3px;}
.flag:hover{background:#f5f5f3;}
.flag.testify-on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;}
.flag.access-on{background:#FAEEDA;color:#854F0B;border-color:#EF9F27;}
.edit-btns{display:flex;gap:4px;margin-left:auto;}
.btn-sm{font-size:11px;padding:2px 6px;height:22px;border:0.5px solid #d8d8d0;border-radius:5px;background:#fff;color:#999;cursor:pointer;display:inline-flex;align-items:center;}
.btn-sm:hover{background:#f5f5f3;}
.notes-toggle{font-size:11px;color:#bbb;cursor:pointer;margin-top:6px;background:none;border:none;padding:0;display:flex;align-items:center;gap:4px;}
.notes-toggle:hover{color:#666;}
.notes-section{display:none;margin-top:8px;border-top:0.5px solid #f0f0e8;padding-top:8px;}
.notes-section.open{display:block;}
.note-entry{font-size:12px;color:#555;padding:4px 0;border-bottom:0.5px solid #f5f5f0;line-height:1.5;}
.note-entry:last-of-type{border-bottom:none;}
.note-meta{font-size:10px;color:#bbb;margin-bottom:1px;}
.note-row{display:flex;gap:5px;margin-top:8px;}
.note-row input{font-size:12px;height:30px;padding:0 8px;border:0.5px solid #d0d0c8;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;}
.note-who{width:68px;}
.note-text{flex:1;}
.empty{text-align:center;padding:2rem 1rem;color:#bbb;font-size:13px;grid-column:1/-1;}

.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;border-bottom:0.5px solid #f0f0e8;}
.cal-week-label{font-size:12px;font-weight:500;}
.cal-nav-btns{display:flex;gap:5px;align-items:center;}
.cal-today-btn{font-size:11px;padding:2px 8px;border:0.5px solid #d0d0c8;border-radius:6px;background:#fff;color:#666;cursor:pointer;}
.cal-today-btn:hover{background:#f0f0ee;}
.cal-body{padding:0.25rem 0;}
.cal-day{padding:0.6rem 1rem;}
.cal-day+.cal-day{border-top:0.5px solid #f5f5f0;}
.cal-day-header{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;}
.cal-date-label{font-size:12px;font-weight:500;}
.cal-today-marker{font-size:10px;color:#378ADD;font-weight:500;}
.cal-meetings{display:flex;flex-direction:column;gap:3px;}
.cal-meeting{font-size:11px;padding:3px 8px;border-radius:5px;border:0.5px solid #e8e8e0;color:#888;background:#fafaf8;display:flex;align-items:center;gap:5px;line-height:1.4;}
.cal-meeting.tier1{background:#EEF5FF;border-color:#B5D4F4;color:#185FA5;font-weight:500;}
.cal-meeting.tier2{background:#f5f5f3;border-color:#ddd;color:#666;}
.cal-time{font-size:10px;margin-left:auto;white-space:nowrap;flex-shrink:0;color:#aaa;}
.cal-meeting.tier1 .cal-time{color:#378ADD;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot.t1{background:#378ADD;}.dot.t2{background:#ccc;}
.cal-no-meetings{font-size:12px;color:#ccc;padding:1.25rem 1rem;text-align:center;}
.cal-legend{display:flex;gap:12px;padding:0.5rem 1rem;border-top:0.5px solid #f0f0e8;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa;}
.leg-dot{width:6px;height:6px;border-radius:50%;}
.leg-dot.t1{background:#378ADD;}.leg-dot.t2{background:#ccc;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:flex-end;justify-content:center;z-index:200;}
.overlay.open{display:flex;}
@media(min-width:480px){.overlay{align-items:center;padding:1rem;}}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
@media(min-width:480px){.modal{border-radius:12px;}}
.modal-handle{width:36px;height:4px;background:#e0e0d8;border-radius:2px;margin:0 auto 1rem;}
.modal h3{font-size:15px;font-weight:500;margin-bottom:1rem;}
.fr{margin-bottom:10px;}
.fr label{font-size:11px;color:#888;display:block;margin-bottom:3px;}
.fr input,.fr select{width:100%;height:34px;padding:0 10px;border:0.5px solid #d0d0c8;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;outline:none;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:12px;padding:6px 16px;border-radius:8px;opacity:0;transition:opacity 0.2s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">AARP Utah · Legislative Tracker</div>
    <div class="header-sub" id="last-sync">Loading…</div>
  </div>
  <button class="sync-btn" onclick="syncNow()" id="sync-btn"><i class="ti ti-refresh"></i> Sync</button>
</div>

<div class="page">
  <div class="outer-grid">

    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title"><i class="ti ti-file-text"></i> Bill Tracker</div>
          <button class="btn btn-primary" onclick="openModal(null)"><i class="ti ti-plus"></i> Add bill</button>
        </div>
        <div class="panel-body">
          <div class="stat-row" id="stats"></div>
          <div class="toolbar">
            <input type="text" id="search" placeholder="Search bills…" oninput="render()">
            <div class="filter-row">
              <select id="fp" onchange="render()">
                <option value="">All positions</option>
                <option value="support">Support</option>
                <option value="oppose">Oppose</option>
                <option value="neutral">Neutral</option>
              </select>
              <select id="fe" onchange="render()">
                <option value="">All engagement</option>
                <option value="3">Full</option>
                <option value="2">Partial</option>
                <option value="1">Watch</option>
              </select>
            </div>
          </div>
          <div class="count" id="count"></div>
          <div id="bill-grid"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title"><i class="ti ti-calendar"></i> 2026 Interim</div>
        </div>
        <div class="cal-nav">
          <div class="cal-week-label" id="cal-week-label"></div>
          <div class="cal-nav-btns">
            <button class="cal-today-btn" onclick="goToday()">Today</button>
            <button class="btn-icon" onclick="prevWeek()"><i class="ti ti-chevron-left"></i></button>
            <button class="btn-icon" onclick="nextWeek()"><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
        <div class="cal-body" id="cal-body"></div>
        <div class="cal-legend">
          <div class="leg-item"><div class="leg-dot t1"></div> Tier 1</div>
          <div class="leg-item"><div class="leg-dot t2"></div> Tier 2</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="mtitle">Add bill</h3>
    <div class="fg">
      <div class="fr"><label>Bill number</label><input id="f-num" placeholder="HB0072"></div>
      <div class="fr"><label>Sponsor</label><input id="f-sponsor" placeholder="Rep. Wilcox"></div>
    </div>
    <div class="fr"><label>Title</label><input id="f-title" placeholder="Short title"></div>
    <div class="fr"><label>Committee</label><input id="f-committee" placeholder="Committee name"></div>
    <div class="fr"><label>Status</label><input id="f-status" placeholder="e.g. Assigned to committee"></div>
    <div class="fg">
      <div class="fr"><label>Position</label>
        <select id="f-pos"><option value="neutral">Neutral</option><option value="support">Support</option><option value="oppose">Oppose</option></select>
      </div>
      <div class="fr"><label>Engagement</label>
        <select id="f-eng"><option value="1">Watch ▌</option><option value="2">Partial ▌▌</option><option value="3">Full ▌▌▌</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBill()">Save bill</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyEi3FbjO73CW8hjAQsiXMoO1tC0QS_3JStsxnmpVOKnvT7v7lP86PFoecDkrVW1g/exec';

const ALL_MEETINGS=[
  {date:'2026-05-19',meetings:[{name:'Appropriations Subcommittees',time:'8:30a',tier:0},{name:'Retirement and Independent Entities',time:'4:00p',tier:2},{name:'Legislative Audit Subcommittee',time:'4:00p',tier:0}]},
  {date:'2026-05-20',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
  {date:'2026-06-16',meetings:[{name:'Appropriations Subcommittees',time:'8:30a',tier:0},{name:'Retirement and Independent Entities',time:'4:00p',tier:2}]},
  {date:'2026-06-17',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
  {date:'2026-08-18',meetings:[{name:'Appropriations Subcommittees',time:'8:30a',tier:0},{name:'Retirement and Independent Entities',time:'4:00p',tier:2},{name:'Legislative Audit Subcommittee',time:'4:00p',tier:0}]},
  {date:'2026-08-19',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
  {date:'2026-09-15',meetings:[{name:'Executive Appropriations',time:'2:00p',tier:0},{name:'Legislative Audit Subcommittee',time:'4:00p',tier:0}]},
  {date:'2026-09-16',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
  {date:'2026-10-13',meetings:[{name:'Appropriations Subcommittees',time:'8:30a',tier:0},{name:'Legislative Audit Subcommittee',time:'4:00p',tier:0}]},
  {date:'2026-10-14',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
  {date:'2026-11-17',meetings:[{name:'Executive Appropriations',time:'2:00p',tier:0},{name:'Retirement and Independent Entities',time:'4:00p',tier:2},{name:'Legislative Audit Subcommittee',time:'4:00p',tier:0}]},
  {date:'2026-11-18',meetings:[{name:'Business and Labor',time:'8:30a',tier:1},{name:'Government Operations',time:'8:30a',tier:1},{name:'Health and Human Services',time:'8:30a',tier:1},{name:'Political Subdivisions',time:'8:30a',tier:2},{name:'Public Utilities, Energy & Technology',time:'8:30a',tier:1},{name:'Judiciary',time:'1:15p',tier:1},{name:'Law Enforcement & Criminal Justice',time:'1:15p',tier:1},{name:'Natural Resources, Ag & Environment',time:'1:15p',tier:2},{name:'Revenue and Taxation',time:'1:15p',tier:1},{name:'Transportation',time:'1:15p',tier:2}]},
];

let weekOffset=0;
function getWeekStart(o){const d=new Date();d.setHours(0,0,0,0);const day=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(day===0?6:day-1)+(o*7));return m;}
function buildCalendar(){
  const ws=getWeekStart(weekOffset);const we=new Date(ws);we.setDate(ws.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('cal-week-label').textContent=`${fmt(ws)} – ${fmt(we)}`;
  const today=new Date();today.setHours(0,0,0,0);
  let html='';let any=false;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const dd=ALL_MEETINGS.find(m=>m.date===ds);
    const rel=dd?dd.meetings.filter(m=>m.tier>=1):[];
    if(!rel.length)continue;
    any=true;
    const isT=d.getTime()===today.getTime();
    html+=`<div class="cal-day"><div class="cal-day-header"><span class="cal-date-label">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>${isT?'<span class="cal-today-marker">Today</span>':''}</div><div class="cal-meetings">${rel.map(m=>`<div class="cal-meeting ${m.tier===1?'tier1':'tier2'}"><div class="dot ${m.tier===1?'t1':'t2'}"></div>${m.name}<span class="cal-time">${m.time}</span></div>`).join('')}</div></div>`;
  }
  document.getElementById('cal-body').innerHTML=any?html:'<div class="cal-no-meetings">No interim meetings this week</div>';
}
function prevWeek(){weekOffset--;buildCalendar();}
function nextWeek(){weekOffset++;buildCalendar();}
function goToday(){weekOffset=0;buildCalendar();}

const SB78={id:'sb78-2026',num:'SB0078',title:'Property Tax Relief Amendments',sponsor:'Sen. (TBC)',committee:'Revenue and Taxation',status:'Failed 2026 session — expected return 2027',position:'oppose',engagement:3,testifying:false,access:false,notes:[{who:'System',text:'Eliminated Circuit Breaker Homeowner Tax Credit and Renter Refund. Replaced with property tax deferral. 50% reduction up to $60k income; freeze/defer up to $75k. Deferred taxes due on sale of home.',date:'May 13'},{who:'System',text:'AARP Utah opposed. Bill failed 2026. High likelihood of return 2027 — deferral framing has caucus appeal. Watch Revenue & Taxation interim.',date:'May 13'}]};

let bills=[];let eid=null;let saving=false;

async function loadFromSheet(){
  try{const r=await fetch(SCRIPT_URL+'?action=read');const d=await r.json();if(d.bills){bills=d.bills;if(!bills.find(b=>b.id==='sb78-2026')){bills.unshift(SB78);await saveToSheet();}}}
  catch(e){bills=[SB78];toast('Could not reach Sheet');}
  setSync();render();
}
async function saveToSheet(){
  if(saving)return;saving=true;setSyncLabel('Saving…');
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'write',bills})});setSync();toast('Saved');}
  catch(e){toast('Save failed');}
  saving=false;setSyncLabel('Sync');
}
async function syncNow(){setSyncLabel('Syncing…');await loadFromSheet();toast('Synced');}
function setSyncLabel(t){document.getElementById('sync-btn').innerHTML=`<i class="ti ti-refresh"></i> ${t}`;}
function setSync(){const n=new Date();document.getElementById('last-sync').textContent='Synced '+n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function barHtml(n){let s='';const h=[8,12,16];for(let i=1;i<=3;i++)s+=`<div class="bar${i<=n?' on':''}" style="height:${h[i-1]}px"></div>`;return`<div class="bars">${s}</div>`;}
function posHtml(p){if(p==='support')return'<span class="badge badge-support">Support</span>';if(p==='oppose')return'<span class="badge badge-oppose">Oppose</span>';return'<span class="badge badge-neutral">Neutral</span>';}

function renderStats(){
  const t=bills.length,s=bills.filter(b=>b.position==='support').length,o=bills.filter(b=>b.position==='oppose').length,ts=bills.filter(b=>b.testifying).length;
  document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-n">${t}</div><div class="stat-l">Total</div></div><div class="stat"><div class="stat-n green">${s}</div><div class="stat-l">Support</div></div><div class="stat"><div class="stat-n red">${o}</div><div class="stat-l">Oppose</div></div><div class="stat"><div class="stat-n blue">${ts}</div><div class="stat-l">Testifying</div></div>`;
}

function cardHtml(b){
  const notes=b.notes||[];
  return`<div class="bill-card ${b.position}">
    <div class="bill-top">
      <div class="bill-meta">
        <div class="bill-number">${b.num||'—'}${b.committee?' · '+b.committee:''}</div>
        <div class="bill-title">${b.title||'Untitled'}</div>
        ${b.sponsor?`<div class="bill-sub">${b.sponsor}</div>`:''}
        ${b.status?`<div class="bill-sub">${b.status}</div>`:''}
      </div>
      <div class="bill-right">${posHtml(b.position)}${barHtml(b.engagement)}</div>
    </div>
    <div class="flags">
      <span class="flag${b.testifying?' testify-on':''}" onclick="tog('${b.id}','testifying')"><i class="ti ti-microphone"></i> Testifying</span>
      <span class="flag${b.access?' access-on':''}" onclick="tog('${b.id}','access')"><i class="ti ti-key"></i> Access needed</span>
      <div class="edit-btns">
        <button class="btn-sm" onclick="openModal('${b.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn-sm" onclick="del('${b.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <button class="notes-toggle" onclick="toggleNotes('notes-${b.id}')"><i class="ti ti-notes"></i> ${notes.length?notes.length+' note'+(notes.length!==1?'s':''):'Notes'} <i class="ti ti-chevron-down"></i></button>
    <div class="notes-section" id="notes-${b.id}">
      ${notes.map(n=>`<div class="note-entry"><div class="note-meta">${n.who} · ${n.date}</div>${n.text}</div>`).join('')}
      <div class="note-row">
        <input class="note-who" id="nwho-${b.id}" placeholder="Name">
        <input class="note-text" id="ntxt-${b.id}" placeholder="Add note…" onkeydown="if(event.key==='Enter')addNote('${b.id}')">
        <button class="btn-sm" onclick="addNote('${b.id}')">Add</button>
      </div>
    </div>
  </div>`;
}

function render(){
  renderStats();
  const q=document.getElementById('search').value.toLowerCase();
  const fp=document.getElementById('fp').value;
  const fe=document.getElementById('fe').value;
  const f=bills.filter(b=>{
    const t=`${b.num} ${b.title} ${b.sponsor} ${b.committee}`.toLowerCase();
    if(q&&!t.includes(q))return false;
    if(fp&&b.position!==fp)return false;
    if(fe&&String(b.engagement)!==fe)return false;
    return true;
  });
  document.getElementById('count').textContent=f.length===bills.length?`${bills.length} bill${bills.length!==1?'s':''}`:`${f.length} of ${bills.length}`;
  const el=document.getElementById('bill-grid');
  if(!bills.length){el.innerHTML='<div class="empty">No bills yet — tap Add bill</div>';return;}
  if(!f.length){el.innerHTML='<div class="empty">No bills match filters</div>';return;}
  el.innerHTML=f.map(b=>cardHtml(b)).join('');
}

function toggleNotes(id){document.getElementById(id).classList.toggle('open');}
async function tog(id,field){const b=bills.find(x=>x.id===id);if(!b)return;b[field]=!b[field];render();await saveToSheet();}
async function addNote(id){
  const b=bills.find(x=>x.id===id);
  const txt=document.getElementById('ntxt-'+id).value.trim();
  const who=document.getElementById('nwho-'+id).value.trim()||'You';
  if(!txt)return;if(!b.notes)b.notes=[];
  const d=new Date();
  b.notes.push({who,text:txt,date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'})});
  render();await saveToSheet();
  setTimeout(()=>{const n=document.getElementById('notes-'+id);if(n)n.classList.add('open');},30);
}
function openModal(id){
  eid=id;
  document.getElementById('mtitle').textContent=id?'Edit bill':'Add bill';
  const b=id?bills.find(x=>x.id===id):null;
  document.getElementById('f-num').value=b?b.num||'':'';
  document.getElementById('f-title').value=b?b.title||'':'';
  document.getElementById('f-sponsor').value=b?b.sponsor||'':'';
  document.getElementById('f-committee').value=b?b.committee||'':'';
  document.getElementById('f-status').value=b?b.status||'':'';
  document.getElementById('f-pos').value=b?b.position||'neutral':'neutral';
  document.getElementById('f-eng').value=b?String(b.engagement||1):'1';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');eid=null;}
async function saveBill(){
  const num=document.getElementById('f-num').value.trim();
  const title=document.getElementById('f-title').value.trim();
  if(!num&&!title)return;
  if(eid){
    const b=bills.find(x=>x.id===eid);
    if(b){b.num=num;b.title=title;b.sponsor=document.getElementById('f-sponsor').value.trim();b.committee=document.getElementById('f-committee').value.trim();b.status=document.getElementById('f-status').value.trim();b.position=document.getElementById('f-pos').value;b.engagement=parseInt(document.getElementById('f-eng').value);}
  }else{
    bills.unshift({id:uid(),num,title,sponsor:document.getElementById('f-sponsor').value.trim(),committee:document.getElementById('f-committee').value.trim(),status:document.getElementById('f-status').value.trim(),position:document.getElementById('f-pos').value,engagement:parseInt(document.getElementById('f-eng').value),testifying:false,access:false,notes:[]});
  }
  closeModal();render();await saveToSheet();
}
async function del(id){if(!confirm('Delete this bill?'))return;bills=bills.filter(x=>x.id!==id);render();await saveToSheet();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

buildCalendar();
loadFromSheet();
</script>
</body>
</html>
